<!DOCTYPE html>
<html>

<head>

<title>Order Details</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container py-5">

<h2 class="mb-4">
📦 Order #{{ order_id }}
</h2>

<table class="table table-bordered">

<thead>

<tr>

<th>Food</th>
<th>Price</th>
<th>Quantity</th>
<th>Subtotal</th>
<th>Action</th>

</tr>

</thead>

<tbody>

{% for item in items %}

<tr>

<td>{{ item[0] }}</td>

<td>₹ {{ item[2] }}</td>

<td>{{ item[1] }}</td>

<td>₹ {{ item[1] * item[2] }}</td>

<td>

<a href="/order_details/{{ order_id}}"
class="btn btn-info btn-sm">

View Details

</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

<a href="/order_history" class="btn btn-primary"> 
⬅ Back
</a>
<a href="/invoice/{{ order_id }}"
class="btn btn-success">

📄 Download Invoice

</a>

</div>

</body>

</html>
