<!DOCTYPE html>
<html>

<head>

<title>Checkout</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container py-5">

<h2 class="mb-4">

💳 Checkout

</h2>

<table class="table table-bordered">

<tr>

<th>Food</th>

<th>Price</th>

<th>Qty</th>

</tr>

{% for item in items %}

<tr>

<td>{{ item[0] }}</td>

<td>₹ {{ item[1] }}</td>

<td>{{ item[2] }}</td>

</tr>

{% endfor %}

</table>

<h3>

Grand Total :

₹ {{ total }}

</h3>

<form method="POST">

<div class="mb-3">

<label>

Payment Method

</label>

<select
class="form-select"
name="payment">

<option>Cash On Delivery</option>

<option>UPI</option>

<option>Card</option>

</select>

</div>

<button class="btn btn-success">

Place Order

</button>

</form>

</div>

</body>

</html>
