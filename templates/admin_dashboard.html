<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

    <h2 class="text-center mb-5">
        👨‍💼 Admin Dashboard
    </h2>

    <div class="row">

        <div class="col-md-3 mb-3">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h3>{{ total_users }}</h3>
                    <p>Total Users</p>
                </div>
            </div>
        </div>

        <div class="col-md-3 mb-3">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h3>{{ total_foods }}</h3>
                    <p>Total Foods</p>
                </div>
            </div>
        </div>

        <div class="col-md-3 mb-3">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h3>{{ total_orders }}</h3>
                    <p>Total Orders</p>
                </div>
            </div>
        </div>

        <div class="col-md-3 mb-3">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h3>₹ {{ total_revenue }}</h3>
                    <p>Total Revenue</p>
                </div>
            </div>
        </div>

    </div>

    <hr>

    <div class="text-center">

        <a href="/admin/foods" class="btn btn-primary m-2">
            🍔 Manage Foods
        </a>

        <a href="/admin/orders" class="btn btn-success m-2">
            📦 View Orders
        </a>

        <a href="/admin/users" class="btn btn-warning m-2">
            👥 View Users
        </a>

        <a href="/admin/sales_report" class="btn btn-info m-2">
            📊 Sales Report
        </a>

        <a href="/admin/logout" class="btn btn-danger m-2">
            🚪 Logout
        </a>

    </div>

</div>

</body>
</html>
