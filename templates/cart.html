<!DOCTYPE html>
<html>

<head>

<title>Cart</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container py-5">

<h2 class="text-center mb-5">

🛒 My Cart

</h2>

<table class="table table-bordered text-center">

<thead>

<tr>

<th>Image</th>

<th>Food</th>

<th>Price</th>

<th>Quantity</th>

<th>Total</th>

<th>Action</th>

</tr>

</thead>

<tbody>

{% for item in cart_items %}

<tr>

<td>

<img src="{{ url_for('static', filename='food_images/' + item[3]) }}"
width="80">

</td>

<td>{{ item[1] }}</td>

<td>₹ {{ item[2] }}</td>

<td>

<a href="/decrease/{{ item[0] }}" class="btn btn-danger btn-sm">-</a>

<span class="mx-2">{{ item[4] }}</span>

<a href="/increase/{{ item[0] }}" class="btn btn-success btn-sm">+</a>

</td>

<td>₹ {{ item[2] * item[4] }}</td>

<td>

<a href="/remove/{{ item[0] }}"
class="btn btn-outline-danger btn-sm">

Remove

</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

<h3 class="text-end">

Grand Total :

<span class="text-success">

₹ {{ total }}

</span>

</h3>

<div class="text-end">

<a href="/checkout"
class="btn btn-success">

Proceed To Checkout

</a>

</div>

</div>

</body>

</html>
