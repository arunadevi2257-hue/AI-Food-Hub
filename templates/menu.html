<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Menu | AI Food Hub</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand fw-bold" href="/">

🍔 AI Food Hub

</a>

<a href="/cart" class="btn btn-warning">

🛒 Cart

</a>

</div>

</nav>

<div class="container py-5">

<h2 class="text-center mb-5">

🍽 Our Menu

</h2>

<div class="row mb-4">

    <div class="col-md-6">
        <input
          type="text"
          class="form-control form-control-lg"
          id="searchFood"
          placeholder="🔍 Search your favorite food..."
          onkeyup="searchFood()">
    </div>

    <div class="col-md-6">
        <select class="form-select" id="categoryFilter" onchange="filterFood()">
            <option value="all">All Categories</option>
            <option value="Breakfast">Breakfast</option>
            <option value="Lunch">Lunch</option>
            <option value="Snacks">Snacks</option>
            <option value="Dinner">Dinner</option>
            <option value="Drinks">Drinks</option>
        </select>
    </div>

</div>

<div class="row">

{% for food in foods %}

<div class="col-lg-3 col-md-4 col-sm-6 mb-4">

<div class="food-card">

<span class="badge bg-danger mb-2">
🔥 AI Recommended
</span>
    
<img src="{{ url_for('static',
filename='food_images/' + food[4]) }}">

<h4>

{{ food[0] }}

<h4>
    {{ food[1] }}
</h4>

<p>
    {{ food[2] }}
</p>

<div class="mb-2">
    ⭐⭐⭐⭐⭐
</div>

<h5 class="text-success">
    ₹ {{ food[3] }}
</h5>

<form action="/review/{{ food[0] }}" method="POST">

<select class="form-select mb-2" name="rating">
    <option value="5">⭐⭐⭐⭐⭐</option>
    <option value="4">⭐⭐⭐⭐</option>
    <option value="3">⭐⭐⭐</option>
    <option value="2">⭐⭐</option>
    <option value="1">⭐</option>
</select>

<textarea
class="form-control mb-2"
name="review"
placeholder="Write your review..."
rows="2"></textarea>

<button class="btn btn-success w-100">
Submit Review
</button>

</form>

</h5>

<a href="/add_to_cart/{{ food[0] }}"
class="btn btn-warning w-100">

🛒 Add To Cart

</a>

<button class="btn btn-outline-danger w-100 mb-2">
❤️ Favorite
</button>

</button>

</div>


</div>

{% endfor %}

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>

</html>
