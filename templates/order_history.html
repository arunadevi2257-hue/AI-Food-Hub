<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Order History</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container py-5">

<h2 class="text-center mb-4">

📦 My Orders

</h2>

<table class="table table-bordered table-hover">

<thead class="table-dark">

<tr>

<th>Order ID</th>
<th>Total</th>
<th>Payment</th>
<th>Date</th>
<th>Action</th>

</tr>

</thead>

<tbody>

{% for order in orders %}

<tr>

<td>#{{ order[0] }}</td>

<td>₹ {{ order[1] }}</td>

<td>{{ order[2] }}</td>

<td>{{ order[3] }}</td>

<td>
        <a href="/order_details/{{ order[0] }}" class="btn btn-info btn-sm">
            View Details
        </a>
    </td>

</tr>

{% endfor %}

</tbody>

</table>

<div class="text-center mt-4">

<a href="/" class="btn btn-primary">

🏠 Back to Home

</a>

</div>

</div>

</body>

</html>
