<!DOCTYPE html>
<html>

<head>

<title>Manage Foods</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container py-5">

<h2 class="mb-4">🍔 Manage Foods</h2>

{% with messages = get_flashed_messages(with_categories=true) %}
{% for category,message in messages %}
<div class="alert alert-{{category}}">
{{message}}
</div>
{% endfor %}
{% endwith %}

<form method="POST" enctype="multipart/form-data">

<div class="row">

<div class="col-md-2">
<select class="form-control" name="category_id" required>
    <option value="1">Breakfast</option>
    <option value="2">Lunch</option>
    <option value="3">Snacks</option>
    <option value="4">Dinner</option>
    <option value="5">Drinks</option>
    <option value="6">Desserts</option>
</select>
</div>

<div class="col-md-2">
<input type="text" class="form-control" name="food_name" placeholder="Food Name" required>
</div>

<div class="col-md-2">
<input type="text" class="form-control" name="description" placeholder="Description" required>
</div>

<div class="col-md-2">
<input type="number" class="form-control" name="price" placeholder="Price" required>
</div>

<input type="file" class="form-control" name="image" required>

<div class="col-md-2">
<button class="btn btn-success w-100">
Add Food
</button>
</div>

</div>

</form>

<hr>

<table class="table table-bordered">

<thead>

<tr>

<th>ID</th>
<th>Image</th>
<th>Food</th>
<th>Price</th>
<th>Action</th>

</tr>

</thead>

<tbody>

{% for food in foods %}

<tr>

<td>{{ food[0] }}</td>

<td>
<img src="{{ url_for('static', filename='food_images/' + food[3]) }}" width="70">
</td>

<td>{{ food[1] }}</td>

<td>₹ {{ food[2] }}</td>

<td>

<a href="/admin/edit_food/{{ food[0] }}"
class="btn btn-primary btn-sm">

Edit

</a>

<a href="/admin/delete_food/{{ food[0] }}"
class="btn btn-danger btn-sm"
onclick="return confirm('Delete this food?')">

Delete

</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>

</html>
