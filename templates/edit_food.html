<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Edit Food</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-body">

                    <h2 class="text-center mb-4">
                        ✏️ Edit Food
                    </h2>

                    <form method="POST">

                        <div class="mb-3">

                            <label class="form-label">
                                Food Name
                            </label>

                            <input
                                type="text"
                                class="form-control"
                                name="food_name"
                                value="{{ food[2] }}"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Description
                            </label>

                            <textarea
                                class="form-control"
                                name="description"
                                rows="3"
                                required>{{ food[3] }}</textarea>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Price
                            </label>

                            <input
                                type="number"
                                class="form-control"
                                name="price"
                                value="{{ food[4] }}"
                                required>

                        </div>

                        <button class="btn btn-success">
                            💾 Update Food
                        </button>

                        <a href="/admin/foods"
                           class="btn btn-secondary">

                            Cancel

                        </a>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
