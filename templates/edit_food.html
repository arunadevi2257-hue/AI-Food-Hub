<!DOCTYPE html>
<html>

<head>
<title>Edit Food</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container py-5">

<h2>Edit Food</h2>

<form method="POST">

<label>Food Name</label>

<input
type="text"
class="form-control mb-3"
name="food_name"
value="{{ food[2] }}"
required>

<label>Description</label>

<input
type="text"
class="form-control mb-3"
name="description"
value="{{ food[3] }}"
required>

<label>Price</label>

<input
type="number"
class="form-control mb-3"
name="price"
value="{{ food[4] }}"
required>

<button class="btn btn-success">
Update Food
</button>

<a href="/admin/foods" class="btn btn-secondary">
Cancel
</a>

</form>

</div>

</body>

</html>
